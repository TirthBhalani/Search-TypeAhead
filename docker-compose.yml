version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: typeahead-postgres
    restart: always
    environment:
      POSTGRES_DB: typeahead_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d typeahead_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-1:
    image: redis:7-alpine
    container_name: typeahead-redis-1
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-2:
    image: redis:7-alpine
    container_name: typeahead-redis-2
    restart: always
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-3:
    image: redis:7-alpine
    container_name: typeahead-redis-3
    restart: always
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: typeahead-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=typeahead_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres_pass
      - REDIS_NODES=redis-1:6379,redis-2:6379,redis-3:6379
      - ENV=production
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./frontend:/app/frontend
    command: sh -c "python /app/scripts/db_init.py && uvicorn main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy

volumes:
  pgdata:
